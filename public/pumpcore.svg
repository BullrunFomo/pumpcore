<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <filter id="pglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="13" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cleft">
      <rect x="-260" y="-100" width="260" height="200"/>
    </clipPath>
    <clipPath id="cright">
      <rect x="0" y="-100" width="260" height="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#000"/>

  <!-- Upper-left signal waves (centered at pill upper-left tip ~356,356) -->
  <g filter="url(#wglow)">
    <path d="M 288,374 A 70,70 0 0,1 374,288"
          fill="none" stroke="#7baeff" stroke-width="20" stroke-linecap="round"/>
    <path d="M 240,387 A 120,120 0 0,1 387,240"
          fill="none" stroke="#7baeff" stroke-width="16" stroke-linecap="round" opacity="0.72"/>
    <path d="M 192,400 A 170,170 0 0,1 400,192"
          fill="none" stroke="#7baeff" stroke-width="12" stroke-linecap="round" opacity="0.50"/>
  </g>

  <!-- Lower-right signal waves (centered at pill lower-right tip ~724,724) -->
  <g filter="url(#wglow)">
    <path d="M 792,706 A 70,70 0 0,1 706,792"
          fill="none" stroke="#7baeff" stroke-width="20" stroke-linecap="round"/>
    <path d="M 840,693 A 120,120 0 0,1 693,840"
          fill="none" stroke="#7baeff" stroke-width="16" stroke-linecap="round" opacity="0.72"/>
    <path d="M 888,680 A 170,170 0 0,1 680,888"
          fill="none" stroke="#7baeff" stroke-width="12" stroke-linecap="round" opacity="0.50"/>
  </g>

  <!-- Pill capsule (centered at 540,540, rotated 45°) -->
  <g transform="translate(540,540) rotate(45)">
    <!-- Dark half (maps to upper-left in screen space) -->
    <rect x="-260" y="-100" width="520" height="200" rx="100"
          fill="#162d7a" clip-path="url(#cleft)"/>
    <!-- Light half (maps to lower-right in screen space) -->
    <rect x="-260" y="-100" width="520" height="200" rx="100"
          fill="#2d60d0" clip-path="url(#cright)"/>
    <!-- Center divider line -->
    <line x1="0" y1="-100" x2="0" y2="100"
          stroke="#9bbfff" stroke-width="2.5" opacity="0.45"/>
    <!-- Glowing outline -->
    <rect x="-260" y="-100" width="520" height="200" rx="100"
          fill="none" stroke="#8ab4ff" stroke-width="11" filter="url(#pglow)"/>
    <!-- Specular reflection dots in the darker half -->
    <circle cx="-128" cy="36" r="14" fill="white" opacity="0.55"/>
    <circle cx="-152" cy="66" r="8.5" fill="white" opacity="0.30"/>
    <circle cx="-110" cy="64" r="6" fill="white" opacity="0.22"/>
  </g>
</svg>
